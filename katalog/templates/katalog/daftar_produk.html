<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Produk - Katalog</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f5f5;
        padding: 20px;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }
      header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px 20px;
        border-radius: 10px;
        margin-bottom: 30px;
        text-align: center;
      }
      header h1 {
        font-size: 2em;
        margin-bottom: 10px;
      }
      header a {
        display: inline-block;
        background: white;
        color: #667eea;
        padding: 10px 20px;
        margin-top: 15px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: 600;
        transition: transform 0.3s ease;
      }
      header a:hover {
        transform: scale(1.05);
      }
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .product-card {
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      }
      .product-card h3 {
        color: #333;
        margin-bottom: 10px;
        font-size: 1.3em;
      }
      .product-card .price {
        color: #667eea;
        font-size: 1.5em;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .product-card p {
        color: #666;
        line-height: 1.6;
        margin-bottom: 15px;
        min-height: 60px;
      }
      .product-card a {
        display: inline-block;
        background-color: #667eea;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: 600;
        transition: background-color 0.3s ease;
      }
      .product-card a:hover {
        background-color: #764ba2;
      }
      .empty-state {
        text-align: center;
        padding: 50px;
        background: white;
        border-radius: 10px;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📦 Daftar Produk</h1>
        <p>Temukan berbagai produk pilihan kami</p>
        <a href="/">← Kembali ke Homepage</a>
      </header>

      {% if produk_list %}
      <div class="product-grid">
        {% for produk in produk_list %}
        <div class="product-card">
          <h3>{{ produk.nama }}</h3>
          <div class="price">{{ produk.harga }}</div>
          <p>{{ produk.deskripsi }}</p>
          <a href="/produk/{{ produk.id }}/">Lihat Detail</a>
        </div>
        {% endfor %}
      </div>
      {% else %}
      <div class="empty-state">
        <p>Tidak ada produk yang tersedia saat ini.</p>
      </div>
      {% endif %}
    </div>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Produk - Katalog</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f5f5;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px 20px;
        border-radius: 10px;
        margin-bottom: 30px;
      }
      header a {
        display: inline-block;
        background: white;
        color: #667eea;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: 600;
        margin-top: 15px;
        transition: transform 0.3s ease;
      }
      header a:hover {
        transform: scale(1.05);
      }
      .detail-card {
        background: white;
        border-radius: 10px;
        padding: 40px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .detail-card h1 {
        color: #333;
        font-size: 2.5em;
        margin-bottom: 20px;
        text-align: center;
      }
      .detail-card .price {
        text-align: center;
        color: #667eea;
        font-size: 2em;
        font-weight: bold;
        margin-bottom: 30px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f0f0f0;
      }
      .detail-card .description {
        color: #666;
        line-height: 1.8;
        font-size: 1.1em;
        margin-bottom: 30px;
        text-align: justify;
      }
      .detail-card .product-id {
        background-color: #f0f0f0;
        padding: 10px 15px;
        border-left: 4px solid #667eea;
        color: #666;
        margin-top: 20px;
      }
      .back-button {
        text-align: center;
        margin-top: 30px;
      }
      .back-button a {
        display: inline-block;
        background-color: #667eea;
        color: white;
        padding: 12px 30px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: 600;
        transition: background-color 0.3s ease;
      }
      .back-button a:hover {
        background-color: #764ba2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h2>← Detail Produk</h2>
        <a href="/produk/">Kembali ke Daftar Produk</a>
      </header>

      {% if produk %}
      <div class="detail-card">
        <h1>{{ produk.nama }}</h1>
        <div class="price">{{ produk.harga }}</div>
        <div class="description">
          <strong>Deskripsi:</strong><br />
          {{ produk.deskripsi }}
        </div>
        <div class="product-id">
          <strong>ID Produk:</strong> {{ produk.id }}
        </div>
      </div>
      {% else %}
      <div class="detail-card" style="text-align: center; color: #999">
        <h2>⚠️ Produk Tidak Ditemukan</h2>
        <p style="margin-top: 20px">
          Maaf, produk yang Anda cari tidak ada dalam katalog kami.
        </p>
      </div>
      {% endif %}

      <div class="back-button">
        <a href="/">Kembali ke Homepage</a>
      </div>
    </div>
  </body>
</html>

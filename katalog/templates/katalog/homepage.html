<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog Produk - Homepage</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        background: white;
        padding: 60px 40px;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 600px;
        text-align: center;
      }
      h1 {
        color: #333;
        margin-bottom: 20px;
        font-size: 2.5em;
      }
      p {
        color: #666;
        line-height: 1.8;
        margin-bottom: 30px;
        font-size: 1.1em;
      }
      .nav-links {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
      }
      a {
        display: inline-block;
        padding: 12px 30px;
        background-color: #667eea;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
        font-weight: 600;
      }
      a:hover {
        background-color: #764ba2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🛒 Katalog Produk</h1>
      <p>
        Selamat datang di website katalog produk kami! Di sini Anda dapat
        melihat berbagai macam produk teknologi terkini dengan kualitas terbaik
        dan harga terjangkau.
      </p>
      <div class="nav-links">
        <a href="/produk/">Lihat Daftar Produk</a>
        <a href="/kontak/">Hubungi Kami</a>
      </div>
    </div>
  </body>
</html>
